<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant POS Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Restaurant POS Insights Dashboard</h1>
      <p>Upload sales data and view AI-powered business insights.</p>
    </header>

    <section class="card">
      <h2>Upload POS File</h2>
      <input type="file" id="fileInput" />
      <button id="uploadBtn">Upload</button>
      <p id="uploadStatus"></p>
    </section>

    <section class="card">
      <h2>Get Insights</h2>
      <button id="loadInsightsBtn">Load Insights</button>
      <div id="insightsContainer">
        <p>No insights loaded yet.</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
